---
layout: default
---

<div class="post-page">
  <div class="post-container">

    <a href="/" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <h1>{{ page.title }}</h1>
    <p class="post-date">
      <i class="far fa-calendar-alt"></i>
      {{ page.date | date: "%B %d, %Y" }}
    </p>

    <div class="post-content">
      {{ content }}
    </div>

  </div>
</div>
